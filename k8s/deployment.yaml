apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-bp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: springboot-bp
  template:
    metadata:
      labels:
        app: springboot-bp
    spec:
      containers:
        - name: springboot-bp
          image: 975050031348.dkr.ecr.us-east-1.amazonaws.com/demo-repo:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: springboot-bp
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  selector:
    app: springboot-bp